<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agency Login — SoleGoes</title>
    <link rel="stylesheet" href="shared/design-system.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        /*
         * SCREEN: AgencyLoginScreen
         * Split layout for desktop, stacked for mobile.
         */

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: var(--bg-deep);
            display: flex;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
        }

        /* ── Split Layout Container ── */
        .login-wrapper {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        /* ── Left Side: Hero Image ── */
        .hero-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
            padding: 48px;
            background-color: var(--bg-surface);
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            object-fit: cover;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.8;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(9,9,11,0.2) 0%, rgba(9,9,11,0.9) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 500px;
        }

        .hero-title {
            font-size: 40px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 12px;
            color: #fff;
        }

        .hero-title span {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            line-height: 1.5;
        }

        /* ── Right Side: Form Content ── */
        .form-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            max-width: 600px;
            background: var(--bg-deep);
            position: relative;
            justify-content: center;
        }

        .form-header {
            display: flex;
            justify-content: flex-end;
            position: absolute;
            top: 40px; right: 40px;
            width: calc(100% - 80px);
        }
        
        .logo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            position: absolute;
            top: 40px; left: 40px;
        }

        .form-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .welcome-text {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .sub-text {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .input-field-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
        }

        .input-field {
            width: 100%;
            background: rgba(255,255,255,.03);
            border: 1px solid var(--border-subtle);
            border-radius: var(--r-md);
            padding: 12px 14px 12px 40px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 200ms ease;
        }

        .input-field:focus {
            background: rgba(255,255,255,.05);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,.1);
        }

        .input-field::placeholder {
            color: var(--text-hint);
        }
        
        .suffix-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            cursor: pointer;
        }

        .forgot-password {
            display: block;
            text-align: right;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            text-decoration: none;
            margin-bottom: 24px;
        }

        .forgot-password:hover {
            color: var(--primary-light);
            text-decoration: underline;
        }

        /* ── Buttons ── */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: var(--r-full);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            text-decoration: none;
            border: none;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: #fff;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
        }

        /* ── Divider ── */
        .divider-container {
            display: flex;
            align-items: center;
            margin: 28px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border-subtle);
        }

        .divider-text {
            color: var(--text-hint);
            font-size: 13px;
            padding: 0 16px;
        }

        /* ── Social Buttons ── */
        .social-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .btn-social {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--r-md);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-social:hover {
            background: rgba(255,255,255,.05);
            border-color: var(--border-glass);
        }
        
        .btn-social svg {
            width: 20px;
            height: 20px;
        }

        /* ── Footer ── */
        .signup-prompt {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .signup-prompt a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .signup-prompt a:hover {
            text-decoration: underline;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .login-wrapper {
                flex-direction: column;
            }
            .hero-section {
                padding: 32px 24px;
                min-height: 250px;
                flex: none;
            }
            .form-section {
                padding: 40px 24px;
            }
            .logo-row {
                top: 24px; left: 24px;
                z-index: 10;
            }
            .form-header {
                position: static;
                justify-content: center;
                margin-bottom: 20px;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <!-- Left Side: Hero Image -->
        <div class="hero-section">
            <img class="hero-bg" src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1200&q=80" alt="Mountain Landscape">
            <div class="hero-overlay"></div>
            
            <div class="logo-row" style="color: white;">
                <div class="logo-mark">S</div>
                <span class="logo-text">SoleGoes</span>
                <span class="logo-role-badge">Agency</span>
            </div>

            <div class="hero-content">
                <h1 class="hero-title">Scale your <span>travel business.</span></h1>
                <p class="hero-subtitle">Manage bookings, publish trips, and grow your revenue with the SoleGoes agency ecosystem.</p>
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="form-section">
            <div class="form-header">
                <button class="btn btn-ghost" style="width: auto; padding: 8px 16px; font-size: 13px; color: var(--text-secondary);" onclick="window.location.href='#'">
                    <i data-lucide="arrow-left" width="14" height="14" style="margin-right: 6px;"></i>
                    Back to Traveler App
                </button>
            </div>

            <div class="form-container">
                <h2 class="welcome-text">Agency Portal</h2>
                <p class="sub-text">Sign in to your agency dashboard</p>

                <!-- Email Input -->
                <div class="input-group">
                    <label class="input-label">Email or Phone</label>
                    <div class="input-field-wrap">
                        <i data-lucide="mail" class="input-icon" width="18" height="18"></i>
                        <input type="text" class="input-field" placeholder="Enter your email" />
                    </div>
                </div>

                <!-- Password Input -->
                <div class="input-group" style="margin-bottom: 8px;">
                    <label class="input-label">Password</label>
                    <div class="input-field-wrap">
                        <i data-lucide="lock" class="input-icon" width="18" height="18"></i>
                        <input type="password" class="input-field" id="pwd" placeholder="Enter your password" />
                        <i data-lucide="eye-off" class="suffix-icon" id="toggle-pwd" width="18" height="18"></i>
                    </div>
                </div>

                <a href="#" class="forgot-password">Forgot Password?</a>

                <button class="btn btn-primary" onclick="simulateLogin()" id="login-btn">
                    Sign In
                </button>

                <div class="divider-container">
                    <div class="divider-line"></div>
                    <span class="divider-text">or continue with</span>
                    <div class="divider-line"></div>
                </div>

                <div class="social-buttons">
                    <button class="btn-social">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-1 7.28-2.69l-3.57-2.77c-.99.69-2.26 1.1-3.71 1.1-2.87 0-5.3-1.94-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.11c-.22-.69-.35-1.43-.35-2.11s.13-1.42.35-2.11V7.05H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.95l3.66-2.84z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.05l3.66 2.84c.87-2.6 3.3-4.51 6.16-4.51z" fill="#EA4335"/>
                        </svg>
                    </button>
                    <button class="btn-social">
                        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35-4.05-3.92-5.45-10.51-2.06-14.7.13-.15.28-.31.42-.45 1.54-1.58 3.55-1.56 4.79-1.56 1.6.01 2.92.68 3.8.68.84 0 2.37-.8 4.34-.8 2.06 0 3.7.83 4.69 2.21-3.99 2.28-3.32 7.7.53 9.34-1.12 2.65-2.88 4.92-4.14 5.28zm-5.11-19.33c.04 2.21-1.63 4.15-3.79 4.39-.46-2.25 1.58-4.26 3.79-4.39z"/>
                        </svg>
                    </button>
                </div>

                <div class="signup-prompt">
                    Not a SoleGoes partner yet? <a href="01_agency_signup.html">Apply now</a>
                </div>

            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Password Reveal Toggle
        const pwdInput = document.getElementById('pwd');
        const togglePwd = document.getElementById('toggle-pwd');
        
        togglePwd.addEventListener('click', () => {
            const type = pwdInput.getAttribute('type') === 'password' ? 'text' : 'password';
            pwdInput.setAttribute('type', type);
            togglePwd.setAttribute('data-lucide', type === 'password' ? 'eye-off' : 'eye');
            lucide.createIcons();
        });

        function simulateLogin() {
            const btn = document.getElementById('login-btn');
            btn.innerHTML = `<svg style="animation:spin 1s linear infinite; margin-right:8px;" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Signing in...`;
            btn.disabled = true;
            // Demo redirect to dashboard after a delay
            setTimeout(() => { window.location.href = '03_agency_dashboard.html'; }, 1200);
        }
    </script>
</body>
</html>
